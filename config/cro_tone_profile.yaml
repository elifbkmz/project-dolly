style_description: >
  Serhat writes like a hands-on CRO who has personally reviewed every account in
  detail. His tone is direct, assertive, and urgent — but not hostile. He opens
  with brief acknowledgment when warranted ("Good execution", "Congratulations on
  the renewal"), then immediately pivots to challenges, questions, and concrete
  next steps. He structures longer comments with numbered points and expects
  detailed, point-by-point responses. He closes with "Thank you" and @mentions
  the AE plus their leadership chain. He is relentless about pipeline acceleration,
  competitor displacement, and POC-driven selling.



# Google Drive configuration and regional file discovery.
# Replace shared_folder_id with the actual Google Drive folder ID
# (visible in the folder URL: drive.google.com/drive/folders/<FOLDER_ID>)

drive:
  shared_folder_id: "1O7dpnZSDG7jq2N1V7tm7mj7XMFepLGb1"

  # Filename patterns for flat folder structures (optional).
  # When the folder contains regional subfolders (e.g., EU/, LATAM/, US/),
  # the app auto-discovers regions from subfolder names and ignores these patterns.
  file_pattern_map: {}

# Sheet tab name heuristics for auto-detection.
# The loader checks if a tab name contains any of these keywords (case-insensitive).
sheet_type_keywords:
  maps:
    - "map"
    - "territory"
    - "ae "
    - "account exec"
    - "contact"
  tech_stake:
    - "tech"
    - "stake"
    - "stack"
    - "product"
    - "usage"
    - "technology"
  summary:
    - "summary"
    - "overview"
    - "account plan"
    - "pipeline"
    - "planning"
    - "account planning"

# Fallback: if auto-detection fails, use these explicit sheet names.
# Set to null to rely purely on auto-detection.
explicit_sheet_names:
  maps: "Maps"
  tech_stake: "Current Tech Stake Information"
  summary: "Account Summary"
